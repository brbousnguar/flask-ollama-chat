services:
  app:
    build: .
    ports:
      - "5001:5000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=gpt-oss:latest
      - OLLAMA_API_KEY=ollama
    volumes:
      - ./data:/app/data
      - ./system_prompt.txt:/app/system_prompt.txt:ro
    restart: unless-stopped
