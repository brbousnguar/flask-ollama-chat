services:
  ai-chat-assistant:
    build: .
    container_name: ai-chat-assistant
    ports:
      - "5001:5000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=gpt-oss:latest
    restart: unless-stopped
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Persist chat threads to the host so JSON files are stored on your PC
      - ./data:/app/data
