<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#8b5cf6">
  <title>AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=9">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-row">
        <div class="header-left">
          <div class="header-badge">
            <span class="header-icon" aria-hidden="true">◆</span>
            <span>AI Assistant</span>
          </div>
        </div>

        <div class="header-right">
          <div class="model-dropdown" id="model-dropdown-wrap">
            <button type="button" class="model-dropdown-btn" id="model-dropdown-btn"
                    aria-haspopup="listbox" aria-expanded="false" aria-label="Select model">
              <span class="model-dropdown-current" id="model-dropdown-current">Loading models…</span>
              <span class="model-dropdown-arrow" aria-hidden="true">▾</span>
            </button>
            <div class="model-dropdown-list" id="model-dropdown-list" role="listbox" hidden></div>
          </div>
          <select id="model-select" hidden aria-hidden="true"></select>
          <button type="button" id="models-btn" class="models-btn" aria-label="Browse models">Models</button>
          <button type="button" id="new-chat-btn" class="new-chat-btn" aria-label="Start new chat">New chat</button>
          <button id="install-btn" class="install-btn" aria-label="Install app" title="Install app" hidden>Install</button>
          <button id="access-btn" class="access-btn" aria-haspopup="true" aria-expanded="false" aria-controls="access-panel" title="Accessibility options">Aa</button>
        </div>
      </div>
      <p class="subtitle">Powered by Ollama</p>
    </header>

    <main class="chat-container">
      <div id="messages" class="messages" role="log" aria-live="polite">
        <div id="empty-state" class="empty-state">
          <div class="empty-state-icon" aria-hidden="true">✧</div>
          <p class="empty-state-title">Start a conversation</p>
          <p class="empty-state-text">Send a message to get started.</p>
        </div>
      </div>

      <div id="typing-indicator" class="typing-indicator" aria-hidden="true" hidden>
        <span class="typing-label">Thinking</span>
        <span class="typing-wave" aria-hidden="true">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </span>
      </div>

      <form id="chat-form" class="input-row" aria-label="Send a message">
        <button type="button" id="new-chat-btn-bottom" class="new-chat-btn-bottom" aria-label="Start new chat">✚</button>
        <textarea
          id="user-input"
          placeholder="Type a message..."
          autocomplete="off"
          aria-label="Message"
          enterkeyhint="enter"
          rows="1"
        ></textarea>
        <button type="button" id="stop-btn" class="stop-btn" aria-label="Stop generating" hidden>
          <span class="stop-icon" aria-hidden="true">■</span>
        </button>
        <button type="submit" id="send-btn" class="send-btn" aria-label="Send">
          <span class="send-icon" aria-hidden="true">→</span>
        </button>
      </form>

      <div id="status" class="status" aria-live="polite"></div>
    </main>
  </div>

  <!-- Models panel -->
  <div id="models-panel" class="models-panel" aria-hidden="true" role="dialog" aria-label="Browse models">
    <div class="models-sheet">
      <div class="models-panel-header">
        <div class="models-panel-title">
          <h2>Models</h2>
          <span class="models-panel-sub">Discover and manage your Ollama models</span>
        </div>
        <div class="models-panel-actions">
          <input id="models-search" type="search" class="models-search" placeholder="Search models…" autocomplete="off">
          <button id="models-close" class="models-close" aria-label="Close">✕</button>
        </div>
      </div>
      <div class="models-tabs" role="tablist">
        <button class="models-tab active" data-tab="local" role="tab">Local <span id="local-count" class="tab-count"></span></button>
        <button class="models-tab" data-tab="library" role="tab">Library <span class="tab-hint">ollama.com</span></button>
      </div>
      <div class="models-toolbar">
        <div class="models-filters" id="models-filters" role="toolbar" aria-label="Model filters">
          <button type="button" class="models-filter active" data-filter="all">All</button>
          <button type="button" class="models-filter" data-filter="code">Code</button>
          <button type="button" class="models-filter" data-filter="vision">Vision</button>
          <button type="button" class="models-filter" data-filter="instruct">Chat</button>
          <button type="button" class="models-filter" data-filter="light">Light</button>
        </div>
        <label class="models-sort-wrap" for="models-sort">
          <span>Sort</span>
          <select id="models-sort" class="models-sort">
            <option value="recommended">Recommended</option>
            <option value="name">Name</option>
            <option value="size-asc">Size: small first</option>
            <option value="size-desc">Size: large first</option>
          </select>
        </label>
      </div>
      <div id="models-list" class="models-list" role="tabpanel"></div>
    </div>
  </div>

  <!-- Accessibility panel -->
  <div id="access-panel" class="access-panel" role="dialog" aria-hidden="true" aria-labelledby="access-title">
    <div class="access-sheet">
      <div class="access-header">
        <h3 id="access-title">Accessibility</h3>
        <button id="access-close" class="access-close" aria-label="Close accessibility panel">✕</button>
      </div>

      <div class="access-group">
        <label>Font size</label>
        <div class="access-controls">
          <button class="font-btn" data-size="sm" aria-label="Small font">A</button>
          <button class="font-btn" data-size="md" aria-label="Medium font">AA</button>
          <button class="font-btn" data-size="lg" aria-label="Large font">AAA</button>
        </div>
      </div>

      <div class="access-group">
        <label>Theme</label>
        <div class="access-controls">
          <button class="theme-btn" data-theme="dark">Dark</button>
          <button class="theme-btn" data-theme="light">Light</button>
          <button class="theme-btn" data-theme="sepia">Sepia</button>
        </div>
      </div>

      <div class="access-group">
        <label>Weight</label>
        <div class="access-controls">
          <button class="weight-btn" data-weight="normal">Normal</button>
          <button class="weight-btn" data-weight="bold">Bold</button>
        </div>
      </div>

      <div class="access-group small">
        <button id="access-reset" class="access-reset">Reset to defaults</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js?v=13"></script>
</body>
</html>
