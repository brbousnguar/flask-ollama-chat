<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-row">
        <div class="header-left">
          <div class="header-badge">
            <span class="header-icon" aria-hidden="true">◆</span>
            <span>AI Assistant</span>
          </div>
          <div id="model-badge" class="model-badge" aria-live="polite" title="Models available">…</div>
        </div>

        <div class="header-right">
          <div class="model-wrap">
            <select id="model-select" class="model-select" aria-label="Select model">
              <option value="">Loading models…</option>
            </select>
          </div>
          <button type="button" id="new-chat-btn" class="new-chat-btn" aria-label="Start new chat">New chat</button>
          <button id="access-btn" class="access-btn" aria-haspopup="true" aria-expanded="false" aria-controls="access-panel" title="Accessibility options">Aa</button>
        </div>
      </div>
      <p class="subtitle">Powered by Ollama</p>
    </header>

    <main class="chat-container">
      <div id="messages" class="messages" role="log" aria-live="polite">
        <div id="empty-state" class="empty-state">
          <div class="empty-state-icon" aria-hidden="true">✧</div>
          <p class="empty-state-title">Start a conversation</p>
          <p class="empty-state-text">Send a message to get started.</p>
        </div>
      </div>

      <div id="typing-indicator" class="typing-indicator" aria-hidden="true" hidden>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>

      <form id="chat-form" class="input-row" aria-label="Send a message">
        <input
          id="user-input"
          type="text"
          placeholder="Type a message..."
          autocomplete="off"
          aria-label="Message"
        />
        <button type="submit" id="send-btn" class="send-btn" aria-label="Send">
          <span class="send-icon" aria-hidden="true">→</span>
        </button>
      </form>

      <div id="status" class="status" aria-live="polite"></div>
    </main>
  </div>

  <!-- Mobile model picker modal -->
  <div id="model-modal" class="model-modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="model-modal-title">
    <div class="model-modal-sheet">
      <div class="model-modal-header">
        <h3 id="model-modal-title">Choose model</h3>
        <button id="model-modal-close" class="model-modal-close" aria-label="Close">✕</button>
      </div>
      <div id="model-modal-list" class="model-modal-list" role="list"></div>
    </div>
  </div>

  <!-- Accessibility panel -->
  <div id="access-panel" class="access-panel" role="dialog" aria-hidden="true" aria-labelledby="access-title">
    <div class="access-sheet">
      <div class="access-header">
        <h3 id="access-title">Accessibility</h3>
        <button id="access-close" class="access-close" aria-label="Close accessibility panel">✕</button>
      </div>

      <div class="access-group">
        <label>Font size</label>
        <div class="access-controls">
          <button class="font-btn" data-size="sm" aria-label="Small font">A</button>
          <button class="font-btn" data-size="md" aria-label="Medium font">AA</button>
          <button class="font-btn" data-size="lg" aria-label="Large font">AAA</button>
        </div>
      </div>

      <div class="access-group">
        <label>Theme</label>
        <div class="access-controls">
          <button class="theme-btn" data-theme="dark">Dark</button>
          <button class="theme-btn" data-theme="light">Light</button>
          <button class="theme-btn" data-theme="sepia">Sepia</button>
        </div>
      </div>

      <div class="access-group">
        <label>Weight</label>
        <div class="access-controls">
          <button class="weight-btn" data-weight="normal">Normal</button>
          <button class="weight-btn" data-weight="bold">Bold</button>
        </div>
      </div>

      <div class="access-group small">
        <button id="access-reset" class="access-reset">Reset to defaults</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js?v=2"></script>
</body>
</html>
